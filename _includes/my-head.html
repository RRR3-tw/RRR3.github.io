<style>
  /* 第一重防線：從根部鎖死 CSS 變數 */
  html, body, :root {
    --sidebar-width: 14rem !important;
  }
</style>

<script>
  /* 第二重防線：JS 突擊隊（等網頁跑完再發動攻擊） */
  window.addEventListener('load', function() {
    
    // 故意延遲 0.5 秒，等主題的流氓 JS 算完之後，我們再強行覆寫！
    setTimeout(function() {
      // 1. 強制把系統基因改成 14rem
      document.documentElement.style.setProperty('--sidebar-width', '14rem', 'important');
      
      // 2. 直接抓住那面牆，強迫它縮小
      var drawer = document.querySelector('hy-drawer') || document.getElementById('sidebar');
      if (drawer) {
        drawer.style.setProperty('width', '14rem', 'important');
        drawer.style.setProperty('max-width', '14rem', 'important');
      }
      
      // 3. 直接抓住文章，強迫它退後
      var pushState = document.querySelector('hy-push-state') || document.getElementById('main');
      if (pushState) {
        pushState.style.setProperty('margin-left', '14rem', 'important');
      }
      
      // 4. 縮小標題跟圖片，免得撐破
      var title = document.querySelector('.sidebar-title');
      if (title) title.style.setProperty('font-size', '1.2rem', 'important');
      
      var avatar = document.querySelector('.sidebar-header img');
      if (avatar) avatar.style.setProperty('max-width', '5rem', 'important');
      
    }, 500); // 500 毫秒的延遲，這就是致勝關鍵！
  });
</script>
